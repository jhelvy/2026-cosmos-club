# .center[**Decades of Policy Whiplash**]

&lt;br&gt;

--

.cols4[

### Obama&lt;br&gt;(2009–2016)

- $7,500 EV tax credit
- Goal: 1M EVs by 2015
- DOE battery R&amp;D investment

]

--

.cols4[

### Trump I&lt;br&gt;(2017–2020)

- Proposed eliminating EV tax credits
- Rolled back fuel economy standards
- Withdrew from Paris Agreement

]

--

.cols4[

### Biden&lt;br&gt;(2021–2024)

- IRA: $369B in clean energy investment
- Expanded EV credits, domestic content rules
- 100% EV federal fleet goal

]

--

.cols4[

### Trump II&lt;br&gt;(2025–Now)

- Gutted IRA
- Rolled back fuel economy standards

]

# How should the US respond to Chinese EVs?

---

## .center[Bipartisan Response (So Far): **Ban Chinese tech**]

.leftcol[

&lt;center&gt;
&lt;img src="images/lutnick.png" width=100%&gt;
&lt;i/center&gt;

]

&lt;br&gt;

.rightcol[

### **Block imports**: Steep tariffs on imported Chinese EVs, batteries (First Biden, continued w/Trump)

&lt;br&gt;

### **Block investment**: Stricter Foreign Entities of Concern (FEOC) rules

]

---

&lt;br&gt;&lt;br&gt;&lt;br&gt;

.leftcol[

## .center[Option A]

## .center[**Exclude Chinese EVs**]

### - China "cheated" its way to the top with subsidies 

### - Chinese EVs are a security threat

### - Chinese EVs will destroy the US auto sector

]

--

.rightcol[

## .center[Option B]

## .center[**Engage strategically**]

### - China built real competitive advantages in manufacturing and supply chains 

### - Chinese EVs are winning markets, US OEMs are losing markets

]

---

.leftcol[

## .center[The Tesla Example:&lt;br&gt;Transparent Cybersecurity]

&lt;br&gt;

### Targeted compliance, not exclusion:

- Store vehicle data **within China**
- Restrict operations near **sensitive areas**
- Use only **government-approved** mapping systems (Baidu)

]

.rightcol[

&lt;br&gt;
&lt;center&gt;
&lt;img src="images/tesla.png" width=70%&gt;
&lt;/center&gt;

]

---

## .center[The European Model:&lt;br&gt;Block Imports, Welcome Chinese FDI]

&lt;br&gt;

- Access to cutting-edge battery tech
- Create local jobs
- Increase supply chain resilience

--

.leftcol[

### .center[**CATL**]

$7.6B battery plant in Debrecen&lt;br&gt;

100 GWh/year for Mercedes-Benz, BMW, Volkswagen

]

.rightcol[

First European EV manufacturing facility&lt;br&gt;

Producing BEVs and PHEVs for the European market

]

# .center[Strategic Responses]

### 🇨🇦🇲🇽 **North American Integration**: Build sufficient scale through Canada and Mexico partnerships

--

### 📋 **Transparent Security Standards**: Develop compliance frameworks all connected vehicles must meet — *regardless of origin*

--

### 🔋 **Battery Manufacturing Focus**: Prioritize domestic production as platform for commercializing next-gen U.S. technologies

--

### 🤝 **Strategic Chinese Partnerships**: Pursue licensing agreements and FDI with targeted safeguards — not wholesale restrictions

--

### 📈 **Sustained Policy Support**: Restore and maintain IRA incentives long enough for investments to mature
